<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>毕业照星河立方体</title>
  <style>
    :root {
      --cube: min(34vmin, 340px);
      --half: calc(var(--cube) / 2);
      --inner: min(20vmin, 196px);
      --inner-half: calc(var(--inner) / 2);
      --open: min(38vmin, 360px);
      --glow-x: 50%;
      --glow-y: 46%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at var(--glow-x) var(--glow-y), rgba(255, 213, 248, 0.24), transparent 22rem),
        radial-gradient(circle at 22% 20%, rgba(117, 215, 255, 0.22), transparent 28rem),
        radial-gradient(circle at 78% 74%, rgba(255, 176, 205, 0.18), transparent 30rem),
        linear-gradient(135deg, #080817 0%, #14112a 42%, #071c2b 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    body::before,
    body::after {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
      opacity: 0.36;
    }

    body::after {
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.7) 0 1px, transparent 1.6px) 8% 18% / 140px 160px,
        radial-gradient(circle, rgba(165, 227, 255, 0.64) 0 1px, transparent 1.8px) 74% 22% / 180px 150px,
        radial-gradient(circle, rgba(255, 194, 232, 0.58) 0 1px, transparent 1.7px) 40% 70% / 170px 190px;
      opacity: 0.52;
      animation: starDrift 22s linear infinite;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .scene {
      position: relative;
      display: grid;
      width: 100vw;
      height: 100vh;
      place-items: center;
      perspective: 1200px;
      isolation: isolate;
    }

    .halo {
      position: absolute;
      width: min(76vmin, 760px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.28), transparent 12%),
        conic-gradient(from 120deg, rgba(119, 232, 255, 0), rgba(119, 232, 255, 0.34), rgba(255, 178, 230, 0.34), rgba(255, 244, 185, 0.2), rgba(119, 232, 255, 0));
      filter: blur(22px);
      opacity: 0.5;
      transform: translateY(3vmin) rotateX(68deg);
      animation: auraSpin 18s linear infinite;
      z-index: -1;
    }

    .shadow {
      position: absolute;
      width: min(42vmin, 410px);
      height: min(9vmin, 88px);
      margin-top: min(50vmin, 500px);
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(120, 220, 255, 0.34), rgba(255, 175, 226, 0.12) 46%, transparent 72%);
      filter: blur(18px);
      opacity: 0.76;
      animation: shadowPulse 5.2s ease-in-out infinite;
    }

    .stage {
      position: relative;
      width: min(72vmin, 720px);
      height: min(72vmin, 720px);
      transform-style: preserve-3d;
      animation: float 5.2s ease-in-out infinite;
    }

    .cube {
      position: absolute;
      inset: 0;
      margin: auto;
      width: var(--cube);
      height: var(--cube);
      transform-style: preserve-3d;
      animation: spin 28s linear infinite;
    }

    .inner-cube {
      position: absolute;
      inset: 0;
      margin: auto;
      width: var(--inner);
      height: var(--inner);
      transform-style: preserve-3d;
      animation: innerSpin 24s linear infinite reverse;
      pointer-events: none;
    }

    .face {
      position: absolute;
      inset: 0;
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.52);
      background: rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 0 30px rgba(255, 255, 255, 0.14),
        0 0 34px rgba(99, 218, 255, 0.22),
        0 0 70px rgba(255, 161, 225, 0.12);
      transition:
        transform 900ms cubic-bezier(0.16, 1, 0.3, 1),
        filter 900ms ease,
        box-shadow 900ms ease;
      backface-visibility: visible;
    }

    .face::before {
      position: absolute;
      inset: 0;
      z-index: 2;
      content: "";
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.34), transparent 28%, rgba(255, 255, 255, 0.08) 52%, transparent),
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.38), transparent 24%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .face::after {
      position: absolute;
      inset: 8px;
      z-index: 3;
      border: 1px solid rgba(255, 255, 255, 0.26);
      content: "";
      pointer-events: none;
    }

    .face img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      opacity: 0.82;
      filter: saturate(1.08) contrast(1.04) brightness(1.03);
      transform: scale(1.02);
      transition: opacity 700ms ease, transform 900ms ease, filter 900ms ease;
    }

    .inner-cube .face {
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(10, 18, 34, 0.84);
      box-shadow:
        inset 0 0 22px rgba(255, 255, 255, 0.16),
        0 0 28px rgba(255, 199, 233, 0.2),
        0 0 38px rgba(155, 230, 255, 0.32);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .inner-cube .face img {
      opacity: 1;
      transform: scale(1.03);
    }

    .inner-cube .face::before {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.26), transparent 32%, rgba(255, 255, 255, 0.08) 62%, transparent),
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.28), transparent 28%);
    }

    .inner-cube .face::after {
      inset: 5px;
      border-color: rgba(255, 255, 255, 0.42);
    }

    .stage:hover .inner-cube .face {
      box-shadow:
        inset 0 0 24px rgba(255, 255, 255, 0.2),
        0 0 34px rgba(155, 230, 255, 0.48),
        0 0 58px rgba(255, 178, 230, 0.26);
    }

    .front { transform: rotateY(0deg) translateZ(var(--half)); }
    .back { transform: rotateY(180deg) translateZ(var(--half)); }
    .right { transform: rotateY(90deg) translateZ(var(--half)); }
    .left { transform: rotateY(-90deg) translateZ(var(--half)); }
    .top { transform: rotateX(90deg) translateZ(var(--half)); }
    .bottom { transform: rotateX(-90deg) translateZ(var(--half)); }

    .inner-cube .front { transform: rotateY(0deg) translateZ(var(--inner-half)); }
    .inner-cube .back { transform: rotateY(180deg) translateZ(var(--inner-half)); }
    .inner-cube .right { transform: rotateY(90deg) translateZ(var(--inner-half)); }
    .inner-cube .left { transform: rotateY(-90deg) translateZ(var(--inner-half)); }
    .inner-cube .top { transform: rotateX(90deg) translateZ(var(--inner-half)); }
    .inner-cube .bottom { transform: rotateX(-90deg) translateZ(var(--inner-half)); }

    .stage:hover .cube > .face {
      filter: brightness(1.13) saturate(1.16);
      box-shadow:
        inset 0 0 38px rgba(255, 255, 255, 0.2),
        0 0 36px rgba(119, 232, 255, 0.34),
        0 0 90px rgba(255, 161, 225, 0.22);
    }

    .stage:hover .cube > .face img {
      opacity: 0.96;
      transform: scale(1.07);
    }

    .stage:hover .cube > .front { transform: rotateY(0deg) translateZ(var(--open)); }
    .stage:hover .cube > .back { transform: rotateY(180deg) translateZ(var(--open)); }
    .stage:hover .cube > .right { transform: rotateY(90deg) translateZ(var(--open)); }
    .stage:hover .cube > .left { transform: rotateY(-90deg) translateZ(var(--open)); }
    .stage:hover .cube > .top { transform: rotateX(90deg) translateZ(var(--open)); }
    .stage:hover .cube > .bottom { transform: rotateX(-90deg) translateZ(var(--open)); }

    .spark {
      position: absolute;
      inset: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px #8feeff, 0 0 40px rgba(255, 177, 230, 0.8);
      opacity: 0.72;
      transform-style: preserve-3d;
      animation: orbit 7.5s linear infinite;
    }

    .spark:nth-child(2) {
      animation-duration: 9s;
      animation-delay: -2s;
      transform-origin: -170px 20px;
    }

    .spark:nth-child(3) {
      animation-duration: 11s;
      animation-delay: -5s;
      transform-origin: 130px -40px;
    }

    .spark:nth-child(4) {
      animation-duration: 8s;
      animation-delay: -1s;
      transform-origin: 60px 150px;
    }

    @keyframes spin {
      from { transform: rotateX(-16deg) rotateY(0deg) rotateZ(2deg); }
      to { transform: rotateX(344deg) rotateY(360deg) rotateZ(2deg); }
    }

    @keyframes innerSpin {
      from { transform: rotateX(-22deg) rotateY(34deg) rotateZ(0deg); }
      to { transform: rotateX(338deg) rotateY(394deg) rotateZ(360deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(-18px) rotateX(0deg); }
      50% { transform: translateY(18px) rotateX(3deg); }
    }

    @keyframes shadowPulse {
      0%, 100% { transform: scale(0.86); opacity: 0.46; }
      50% { transform: scale(1.12); opacity: 0.78; }
    }

    @keyframes auraSpin {
      to { transform: translateY(3vmin) rotateX(68deg) rotateZ(360deg); }
    }

    @keyframes orbit {
      from { transform: rotateZ(0deg) translateX(240px) rotateX(70deg); }
      to { transform: rotateZ(360deg) translateX(240px) rotateX(70deg); }
    }

    @keyframes starDrift {
      to { background-position: 12% 30%, 66% 34%, 48% 60%; }
    }

    @media (max-width: 720px) {
      :root {
        --cube: min(48vmin, 280px);
        --inner: min(25vmin, 148px);
        --open: min(46vmin, 275px);
      }

      .stage {
        width: 96vmin;
        height: 96vmin;
      }

      .shadow {
        margin-top: 62vmin;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles" aria-hidden="true"></canvas>
  <main class="scene" aria-label="毕业照立方体动画">
    <div class="halo"></div>
    <div class="shadow"></div>
    <section class="stage">
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>

      <div class="cube" aria-hidden="true">
        <figure class="face front"><img alt=""></figure>
        <figure class="face back"><img alt=""></figure>
        <figure class="face right"><img alt=""></figure>
        <figure class="face left"><img alt=""></figure>
        <figure class="face top"><img alt=""></figure>
        <figure class="face bottom"><img alt=""></figure>
      </div>

      <div class="inner-cube" aria-hidden="true">
        <figure class="face front"><img alt=""></figure>
        <figure class="face back"><img alt=""></figure>
        <figure class="face right"><img alt=""></figure>
        <figure class="face left"><img alt=""></figure>
        <figure class="face top"><img alt=""></figure>
        <figure class="face bottom"><img alt=""></figure>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#particles");
    const ctx = canvas.getContext("2d");
    const photoUrls = Array.from({ length: 12 }, (_, index) => {
      const number = String(index + 1).padStart(2, "0");
      return `./web-assets/photo-${number}.jpg`;
    });
    const pointer = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let particles = [];
    let width = 0;
    let height = 0;
    let dpr = 1;

    function randomizePhotos() {
      const shuffled = [...photoUrls];

      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }

      document.querySelectorAll(".face img").forEach((img, index) => {
        img.src = shuffled[index];
      });
    }

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.max(78, Math.min(150, Math.floor((width * height) / 13000)));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        z: Math.random() * 0.9 + 0.1,
        vx: (Math.random() - 0.5) * 0.28,
        vy: (Math.random() - 0.5) * 0.28,
        r: Math.random() * 1.9 + 0.6,
        hue: 190 + Math.random() * 120,
        pulse: Math.random() * Math.PI * 2
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      const gradient = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, Math.max(width, height) * 0.55);
      gradient.addColorStop(0, "rgba(255, 220, 248, 0.11)");
      gradient.addColorStop(0.42, "rgba(105, 218, 255, 0.035)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < particles.length; i += 1) {
        const p = particles[i];
        const dx = pointer.x - p.x;
        const dy = pointer.y - p.y;
        const distance = Math.hypot(dx, dy) || 1;
        const pull = Math.max(0, 1 - distance / 280) * 0.018;

        p.vx += (dx / distance) * pull;
        p.vy += (dy / distance) * pull;
        p.vx *= 0.992;
        p.vy *= 0.992;
        p.x += p.vx * (1.8 - p.z);
        p.y += p.vy * (1.8 - p.z);
        p.pulse += 0.025;

        if (p.x < -20) p.x = width + 20;
        if (p.x > width + 20) p.x = -20;
        if (p.y < -20) p.y = height + 20;
        if (p.y > height + 20) p.y = -20;

        const radius = p.r * (1 + Math.sin(p.pulse) * 0.28);
        ctx.beginPath();
        ctx.fillStyle = `hsla(${p.hue}, 92%, 78%, ${0.34 + p.z * 0.45})`;
        ctx.shadowColor = `hsla(${p.hue}, 95%, 75%, 0.9)`;
        ctx.shadowBlur = 14 * p.z;
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.shadowBlur = 0;
      ctx.lineWidth = 0.65;
      for (let i = 0; i < particles.length; i += 1) {
        for (let j = i + 1; j < particles.length; j += 1) {
          const a = particles[i];
          const b = particles[j];
          const distance = Math.hypot(a.x - b.x, a.y - b.y);
          if (distance < 120) {
            ctx.strokeStyle = `rgba(199, 238, 255, ${(1 - distance / 120) * 0.13})`;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("pointermove", (event) => {
      pointer.x = event.clientX;
      pointer.y = event.clientY;
      document.documentElement.style.setProperty("--glow-x", `${(event.clientX / window.innerWidth) * 100}%`);
      document.documentElement.style.setProperty("--glow-y", `${(event.clientY / window.innerHeight) * 100}%`);
    });

    randomizePhotos();
    resize();
    draw();
  </script>
</body>
</html>
